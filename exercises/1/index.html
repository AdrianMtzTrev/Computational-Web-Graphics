<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            box-sizing: border-box;
            font-family: Roboto;
        }

        body{
            background-color: #0f0011;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .title{
            color: white
        }
        .sub-title{
            color: white
        }
        label{
            color: white;
        }
        @property --pixelR{
            syntax: '<numeric>'; 
            initial-value: 0deg;
            inherits: false;
        }
        input{
            border-radius: var(--pixelR);
            padding: 5px;
            display: block;
            border: 1px solid;
        }
        input[type="text"]:hover {
            animation: borderRadiusAumentus 1s linear infinite;
        }
        @property --angle{
            syntax: '<angle>'; 
            initial-value: 0deg;
            inherits: false;
        }
        input[type="submit"] {
            background: linear-gradient(var(--angle), #000000, #aaffff);
            animation: colorRotation 3s linear infinite;
            border: none;
            border-radius: 8px;
            margin: 5px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }
        @keyframes borderRadiusAumentus{
            10% { --pixelR: 0px; }
            20% { --pixelR: 5px; }
            30% { --pixelR: 10px; }
            40% { --pixelR: 15px; }
            50% { --pixelR: 20px; } 
            62% { --pixelR: 15px; }
            75% { --pixelR: 10px; }
            87% { --pixelR: 5px; }
            100% { --pixelR: 0px; }
        }
        @keyframes colorRotation{
            from {--angle: 0deg}    
            to {--angle: 359deg}    
        }
        @keyframes colorRotationN{
            from {--angle: 359deg}    
            to {--angle: 0deg}    
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
            animation: colorRotationN 1s linear infinite;
        }
    </style>
    <title>Document</title>
</head>
<body>
	<h1 class="title">Adrián Martinez Treviño</h1>
	<h2 class="sub-title">1958524</h2>
	<form action="target.html" class="">
        <label for="">Input</label>
        <input type="text" name="value">
        <input type="submit">
    </form>
</body>
</html>
