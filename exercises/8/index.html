<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 8 - Colisión + PointLight</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="info">Flechas / WASD para mover el cubo → Acércate al objetivo</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three'
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x111122)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100)
        camera.position.set(8, 6, 10)
        camera.lookAt(0, 0, 0)

        const renderer = new THREE.WebGLRenderer()
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        renderer.shadowMap.enabled = true
        document.body.appendChild(renderer.domElement)

        new OrbitControls(camera, renderer.domElement)

        const ambientLight = new THREE.AmbientLight(0x333355, 0.4)
        scene.add(ambientLight)

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6)
        dirLight.position.set(5, 10, 5)
        dirLight.castShadow = true
        scene.add(dirLight)

        const grid = new THREE.GridHelper(10, 10)
        scene.add(grid)

        const player = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0x33aaff })
        )
        player.position.set(-3, 0.5, 0)
        player.castShadow = true
        scene.add(player)

        const target = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x224422 })
        )
        target.position.set(3, 0.8, 0)
        scene.add(target)

        const pointLight = new THREE.PointLight(0xffaa00, 0, 10)
        pointLight.position.set(3, 2, 0)
        scene.add(pointLight)

        const lightSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xffaa00 })
        )
        lightSphere.position.copy(pointLight.position)
        scene.add(lightSphere)

        const info = document.getElementById('info')
        let collision = false

        function checkCollision() {
            const dist = player.position.distanceTo(target.position)
            if (dist < 1.5 && !collision) {
                collision = true
                pointLight.intensity = 3
                info.textContent = '¡COLISIÓN! PointLight encendido'
                info.style.background = 'rgba(255, 170, 0, 0.8)'
            } else if (dist >= 1.5 && collision) {
                collision = false
                pointLight.intensity = 0
                info.textContent = 'Flechas / WASD para mover el cubo → Acércate al objetivo'
                info.style.background = 'rgba(0,0,0,0.7)'
            }
        }

        const keys = {}
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true })
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false })

        function movePlayer() {
            const speed = 0.08
            if (keys['arrowup'] || keys['w']) player.position.z -= speed
            if (keys['arrowdown'] || keys['s']) player.position.z += speed
            if (keys['arrowleft'] || keys['a']) player.position.x -= speed
            if (keys['arrowright'] || keys['d']) player.position.x += speed
        }

        function animate() {
            requestAnimationFrame(animate)
            movePlayer()
            checkCollision()
            renderer.render(scene, camera)
        }

        animate()

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })
    </script>
</body>
</html>
