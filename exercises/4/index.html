<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 - 3 Geometrías Extra</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three'
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x222222)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100)
        camera.position.set(6, 4, 8)
        camera.lookAt(0, 0, 0)

        const renderer = new THREE.WebGLRenderer()
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        document.body.appendChild(renderer.domElement)

        new OrbitControls(camera, renderer.domElement)

        const cube = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 1.5, 1.5),
            new THREE.MeshBasicMaterial({ color: 0xff5733 })
        )
        cube.position.set(-3, 0, 0)
        scene.add(cube)

        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x33aaff })
        )
        sphere.position.set(3, 0, 0)
        scene.add(sphere)

        const cylinder = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 1.8, 32),
            new THREE.MeshBasicMaterial({ color: 0x33ff57 })
        )
        cylinder.position.set(0, 0, -3)
        scene.add(cylinder)

        const cone = new THREE.Mesh(
            new THREE.ConeGeometry(1.2, 2, 32),
            new THREE.MeshBasicMaterial({ color: 0xffcc00 })
        )
        cone.position.set(0, 0, 3)
        scene.add(cone)

        function animate() {
            requestAnimationFrame(animate)
            cube.rotation.x += 0.01
            cube.rotation.y += 0.01
            sphere.rotation.y += 0.01
            cylinder.rotation.y += 0.01
            cone.rotation.y += 0.01
            renderer.render(scene, camera)
        }

        animate()

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })
    </script>
</body>
</html>
