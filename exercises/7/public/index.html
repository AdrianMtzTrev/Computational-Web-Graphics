<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7 - Socket.io + Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        #colorPicker {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: white;
        }
        #colorPicker input {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="info">WASD / Flechas para mover el cubo. El color picker cambia tu cubo en todas las ventanas.</div>
    <div id="colorPicker">
        <label for="colorInput">Color:</label>
        <input type="color" id="colorInput" value="#33aaff">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three'
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

        const socket = io()

        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x222233)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100)
        camera.position.set(6, 4, 8)
        camera.lookAt(0, 0, 0)

        const renderer = new THREE.WebGLRenderer()
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        document.body.appendChild(renderer.domElement)

        new OrbitControls(camera, renderer.domElement)

        const ambientLight = new THREE.AmbientLight(0x404060)
        scene.add(ambientLight)

        const dirLight = new THREE.DirectionalLight(0xffffff, 1)
        dirLight.position.set(5, 10, 5)
        scene.add(dirLight)

        const grid = new THREE.GridHelper(10, 10)
        scene.add(grid)

        const myCube = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0x33aaff })
        )
        myCube.position.set(0, 0.5, 0)
        scene.add(myCube)

        const otherCubes = {}

        const colorInput = document.getElementById('colorInput')
        colorInput.addEventListener('input', () => {
            myCube.material.color.set(colorInput.value)
            socket.emit('colorChange', { color: colorInput.value })
        })

        function sendPosition() {
            socket.emit('objectMove', {
                position: {
                    x: myCube.position.x,
                    y: myCube.position.y,
                    z: myCube.position.z
                },
                rotation: {
                    y: myCube.rotation.y
                }
            })
        }

        socket.on('objectMove', (data) => {
            if (data.id === socket.id) return

            if (!otherCubes[data.id]) {
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 1, 1),
                    new THREE.MeshStandardMaterial({
                        color: 0xff5533,
                        transparent: true,
                        opacity: 0.7
                    })
                )
                cube.position.set(data.position.x, data.position.y, data.position.z)
                cube.rotation.y = data.rotation.y
                scene.add(cube)
                otherCubes[data.id] = cube
            } else {
                otherCubes[data.id].position.set(data.position.x, data.position.y, data.position.z)
                otherCubes[data.id].rotation.y = data.rotation.y
            }
        })

        socket.on('colorChange', (data) => {
            if (data.id === socket.id) return
            if (otherCubes[data.id]) {
                otherCubes[data.id].material.color.set(data.color)
            }
        })

        socket.on('playerDisconnected', (id) => {
            if (otherCubes[id]) {
                scene.remove(otherCubes[id])
                delete otherCubes[id]
            }
        })

        const keys = {}
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true })
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false })

        let lastSend = 0

        function animate() {
            requestAnimationFrame(animate)

            const speed = 0.08
            let moved = false
            if (keys['arrowup'] || keys['w']) { myCube.position.z -= speed; moved = true }
            if (keys['arrowdown'] || keys['s']) { myCube.position.z += speed; moved = true }
            if (keys['arrowleft'] || keys['a']) { myCube.position.x -= speed; moved = true }
            if (keys['arrowright'] || keys['d']) { myCube.position.x += speed; moved = true }

            const now = Date.now()
            if (moved && now - lastSend > 50) {
                sendPosition()
                lastSend = now
            }

            renderer.render(scene, camera)
        }

        animate()

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })
    </script>
</body>
</html>
